<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>案例详情</title>
    <link rel="stylesheet" href="./solution-detail.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-dot"></span>
          <span>产品场景实践库</span>
        </div>
        <div class="nav-group">
          <p class="group-title">主导航</p>
          <button class="nav-item" type="button"><span class="nav-icon">⌂</span><span>首页</span></button>
          <button class="nav-item" type="button"><span class="nav-icon">▦</span><span>产品场景库</span></button>
          <button class="nav-item" type="button"><span class="nav-icon">◉</span><span>产品解决方案</span></button>
          <button class="nav-item active" type="button"><span class="nav-icon">◫</span><span>客户案例</span></button>
        </div>
        <div class="nav-group">
          <p class="group-title">管理中心</p>
          <button class="nav-item" type="button"><span class="nav-icon">▤</span><span>概览</span></button>
          <button class="nav-item" type="button"><span class="nav-icon">◍</span><span>基础数据管理</span></button>
          <button class="nav-item" type="button"><span class="nav-icon">◌</span><span>用户管理</span></button>
          <button class="nav-item" type="button"><span class="nav-icon">◈</span><span>权限管理</span></button>
          <button class="nav-item" type="button"><span class="nav-icon">↗</span><span>开放管理</span></button>
        </div>
        <div class="nav-group">
          <p class="group-title">系统</p>
          <button class="nav-item" type="button"><span class="nav-icon">⚙</span><span>系统设置</span></button>
          <button class="nav-item" type="button"><span class="nav-icon">⟳</span><span>操作日志</span></button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div id="breadcrumb" class="breadcrumb"></div>
          <button id="go-back" class="btn ghost" type="button">返回列表</button>
        </header>

        <div class="container">
          <section class="card title-card">
            <h1 id="case-name"></h1>
            <p id="case-meta"></p>
          </section>
          <section class="card">
            <h3>成果摘要</h3>
            <p id="case-summary"></p>
          </section>
        </div>
      </main>
    </div>
    <script src="./navigation.js"></script>
    <script src="./case-detail.js"></script>
  </body>
</html>
