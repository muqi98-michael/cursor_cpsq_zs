<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开放管理</title>
    <link rel="stylesheet" href="./scenes.css" />
    <style>
      .open-grid-top {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 23px;
      }
      .open-grid-bottom {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 23px;
      }
      .open-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        min-height: 166px;
        padding: 23px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .open-card.large {
        min-height: 206px;
      }
      .open-icon {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
      }
      .open-icon.blue {
        background: #dbeafe;
        color: #2563eb;
      }
      .open-icon.purple {
        background: #f3e8ff;
        color: #9333ea;
      }
      .open-icon.green {
        background: #dcfce7;
        color: #16a34a;
      }
      .open-icon.amber {
        background: #fef3c7;
        color: #d97706;
      }
      .open-icon.indigo {
        background: #e0e7ff;
        color: #4f46e5;
      }
      .open-icon.gray {
        background: #f3f4f6;
        color: #9ca3af;
        border-radius: 999px;
      }
      .open-title {
        margin: 15px 0 8px;
        font-size: 22px;
        color: #1e293b;
      }
      .open-desc {
        margin: 0;
        font-size: 14px;
        color: #64748b;
      }
      .open-action {
        margin-top: 16px;
        border: 0;
        background: transparent;
        color: #2563eb;
        padding: 0;
        font-size: 14px;
        cursor: pointer;
      }
      .open-add {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .open-add .open-title {
        margin: 16px 0 0;
        color: #94a3b8;
        font-size: 18px;
      }
      @media (max-width: 1280px) {
        .open-grid-bottom {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <span class="logo-box">P</span>
          <span id="sidebar-title"></span>
        </div>

        <div class="nav-group">
          <p class="nav-title">主导航</p>
          <div id="main-nav"></div>
        </div>

        <div class="nav-group">
          <p class="nav-title">管理中心</p>
          <div id="manage-nav"></div>
        </div>

        <div class="nav-group">
          <p class="nav-title">系统</p>
          <div id="system-nav"></div>
        </div>

        <div class="sidebar-user">
          <div class="avatar">ZL</div>
          <div>
            <p id="sidebar-user-name" class="user-name"></p>
            <p id="sidebar-user-role" class="user-role"></p>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div id="breadcrumb" class="breadcrumb"></div>
        </header>

        <section class="content">
          <div class="page-title">
            <div>
              <h1 id="page-title"></h1>
              <p id="page-subtitle"></p>
            </div>
          </div>

          <section id="open-top" class="open-grid-top"></section>
          <section id="open-bottom" class="open-grid-bottom"></section>
        </section>
      </main>
    </div>
    <script src="./navigation.js"></script>
    <script src="./open-management.js"></script>
  </body>
</html>
